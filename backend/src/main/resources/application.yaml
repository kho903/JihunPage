spring:
  application:
    name: backend

  datasource:
    url: jdbc:h2:mem:jihunpage
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  gallery:
    upload-directory: ./uploads/gallery